databaseChangeLog:
  - changeSet:
      id: 005-create-trip-members-table
      author: travyn
      changes:
        - createTable:
            tableName: trip_members
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: trip_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: member_role
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: member_status
                  type: varchar(20)
                  constraints:
                    nullable: false
              - column:
                  name: joined_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: approved_by
                  type: uuid
        - addForeignKeyConstraint:
            baseTableName: trip_members
            baseColumnNames: trip_id
            constraintName: fk_trip_members_trip
            referencedTableName: trips
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: trip_members
            baseColumnNames: user_id
            constraintName: fk_trip_members_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            constraintName: uk_trip_members_trip_user
            tableName: trip_members
            columnNames: trip_id, user_id
        - createIndex:
            indexName: idx_trip_members_trip_id
            tableName: trip_members
            columns:
              - column:
                  name: trip_id
        - createIndex:
            indexName: idx_trip_members_user_id
            tableName: trip_members
            columns:
              - column:
                  name: user_id
