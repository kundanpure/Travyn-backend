databaseChangeLog:
  - changeSet:
      id: 032-create-trip-invite-tokens
      author: antigravity
      changes:
        - createTable:
            tableName: trip_invite_tokens
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: trip_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: invited_by
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: token
                  type: VARCHAR(64)
                  constraints:
                    unique: true
                    nullable: false
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: max_uses
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: used_count
                  type: INT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: auto_approve
                  type: BOOLEAN
                  defaultValueBoolean: true
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: trip_invite_tokens
            baseColumnNames: trip_id
            referencedTableName: trips
            referencedColumnNames: id
            constraintName: fk_invite_tokens_trip
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: trip_invite_tokens
            baseColumnNames: invited_by
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_invite_tokens_user
        - createIndex:
            indexName: idx_invite_token_active
            tableName: trip_invite_tokens
            columns:
              - column:
                  name: token
            unique: true
