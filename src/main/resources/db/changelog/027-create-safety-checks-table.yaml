databaseChangeLog:
  - changeSet:
      id: 027-create-safety-checks-table
      author: kundanpure
      changes:
        - createTable:
            tableName: safety_checks
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_safety_check_user
                    references: users(id)
              - column:
                  name: trip_id
                  type: UUID
                  constraints:
                    nullable: false
                    foreignKeyName: fk_safety_check_trip
                    references: trips(id)
              - column:
                  name: status
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: last_lat
                  type: DOUBLE
              - column:
                  name: last_lng
                  type: DOUBLE
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: expires_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: resolved_at
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: escalated_at
                  type: TIMESTAMP WITH TIME ZONE
