databaseChangeLog:
  - changeSet:
      id: create-direct-messages-table
      author: travyn
      changes:
        - createTable:
            tableName: direct_messages
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: sender_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: receiver_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: content
                  type: TEXT
                  constraints:
                    nullable: false
              - column:
                  name: message_type
                  type: VARCHAR(20)
                  defaultValue: 'TEXT'
                  constraints:
                    nullable: false
              - column:
                  name: is_read
                  type: BOOLEAN
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_dm_sender_receiver
            tableName: direct_messages
            columns:
              - column:
                  name: sender_id
              - column:
                  name: receiver_id
        - createIndex:
            indexName: idx_dm_created
            tableName: direct_messages
            columns:
              - column:
                  name: created_at
