databaseChangeLog:
  - changeSet:
      id: create-trip-waypoints-table
      author: kundan
      changes:
        - createTable:
            tableName: trip_waypoints
            columns:
              - column:
                  name: id
                  type: uuid
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: trip_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: creator_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: latitude
                  type: float8
                  constraints:
                    nullable: false
              - column:
                  name: longitude
                  type: float8
                  constraints:
                    nullable: false
              - column:
                  name: label
                  type: varchar(100)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp
                  constraints:
                    nullable: false
