databaseChangeLog:
  - changeSet:
      id: 036-create-trip-settlements-table
      author: travyn
      changes:
        - createTable:
            tableName: trip_settlements
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: trip_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: from_user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: to_user_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: amount
                  type: DECIMAL(12, 2)
                  constraints:
                    nullable: false
              - column:
                  name: payment_method
                  type: VARCHAR(30)
                  defaultValue: "CASH"
                  constraints:
                    nullable: false
              - column:
                  name: status
                  type: VARCHAR(30)
                  defaultValue: "PENDING"
                  constraints:
                    nullable: false
              - column:
                  name: notes
                  type: TEXT
              - column:
                  name: rejection_reason
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP WITH TIME ZONE
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: trip_settlements
            baseColumnNames: trip_id
            constraintName: fk_settlements_trip
            referencedTableName: trips
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: trip_settlements
            baseColumnNames: from_user_id
            constraintName: fk_settlements_from_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: trip_settlements
            baseColumnNames: to_user_id
            constraintName: fk_settlements_to_user
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE
