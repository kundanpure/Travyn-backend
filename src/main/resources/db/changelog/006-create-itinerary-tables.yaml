databaseChangeLog:
  - changeSet:
      id: 006-create-itinerary-days-table
      author: travyn
      changes:
        - createTable:
            tableName: itinerary_days
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: trip_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: date
                  type: date
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(200)
              - column:
                  name: notes
                  type: text
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: itinerary_days
            baseColumnNames: trip_id
            constraintName: fk_itinerary_days_trip
            referencedTableName: trips
            referencedColumnNames: id
            onDelete: CASCADE
        - addUniqueConstraint:
            tableName: itinerary_days
            columnNames: trip_id, date
            constraintName: uk_itinerary_days_trip_date
        - createIndex:
            indexName: idx_itinerary_days_trip_id
            tableName: itinerary_days
            columns:
              - column:
                  name: trip_id

  - changeSet:
      id: 006-create-itinerary-items-table
      author: travyn
      changes:
        - createTable:
            tableName: itinerary_items
            columns:
              - column:
                  name: id
                  type: uuid
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: day_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: trip_id
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: title
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: text
              - column:
                  name: location
                  type: varchar(300)
              - column:
                  name: start_time
                  type: time
              - column:
                  name: end_time
                  type: time
              - column:
                  name: category
                  type: varchar(30)
                  defaultValue: ACTIVITY
                  constraints:
                    nullable: false
              - column:
                  name: sort_order
                  type: int
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: created_by
                  type: uuid
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp with time zone
                  defaultValueComputed: now()
                  constraints:
                    nullable: false
        - addForeignKeyConstraint:
            baseTableName: itinerary_items
            baseColumnNames: day_id
            constraintName: fk_itinerary_items_day
            referencedTableName: itinerary_days
            referencedColumnNames: id
            onDelete: CASCADE
        - addForeignKeyConstraint:
            baseTableName: itinerary_items
            baseColumnNames: trip_id
            constraintName: fk_itinerary_items_trip
            referencedTableName: trips
            referencedColumnNames: id
            onDelete: CASCADE
        - createIndex:
            indexName: idx_itinerary_items_day_id
            tableName: itinerary_items
            columns:
              - column:
                  name: day_id
        - createIndex:
            indexName: idx_itinerary_items_trip_id
            tableName: itinerary_items
            columns:
              - column:
                  name: trip_id
