# ═══════════════════════════════════════════════════════════════
#  Travyn Backend — Production Profile
#  Activate: SPRING_PROFILES_ACTIVE=prod (set in Render env vars)
#  ALL secrets are read from environment variables.
# ═══════════════════════════════════════════════════════════════

# ── Datasource (Neon PostgreSQL) ──
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=90000
spring.datasource.hikari.initialization-fail-timeout=90000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=180000

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=validate

# ── Liquibase ──
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# ── Redis — DISABLED (not used in code yet) ──
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# ── Logging (reduced for production) ──
logging.level.com.travyn=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
