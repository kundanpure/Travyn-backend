# ═══════════════════════════════════════════════════════════════
#  Travyn Backend — Production Profile
#  Activate: SPRING_PROFILES_ACTIVE=prod (set in Render env vars)
#  ALL secrets are read from environment variables.
# ═══════════════════════════════════════════════════════════════

server.port=8080
spring.application.name=travyn-backend

# ── Datasource (Neon PostgreSQL) ──
spring.datasource.url=${NEON_DB_URL}
spring.datasource.username=${NEON_DB_USERNAME}
spring.datasource.password=${NEON_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=90000
spring.datasource.hikari.initialization-fail-timeout=90000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=180000

# ── JPA / Hibernate ──
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jpa.hibernate.ddl-auto=validate

# ── Liquibase ──
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# ── Redis and Mail Health Check — DISABLED ──
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.boot.actuate.autoconfigure.mail.MailHealthContributorAutoConfiguration

# ── Google OAuth ──
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
# JavaMailSender is still auto-configured but unused; emails go via Brevo HTTP API
spring.mail.host=localhost
spring.mail.port=25
spring.mail.username=${MAIL_USERNAME:codekundan01@gmail.com}
spring.mail.password=${MAIL_PASSWORD:unused}

# ── Brevo Transactional Email API ──
brevo.api-key=${BREVO_API_KEY:}
brevo.sender-email=${BREVO_SENDER_EMAIL:kundankumar8797737@gmail.com}
brevo.sender-name=Travyn

# ── JWT ──
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ── CORS ──
app.cors.allowed-origins=${CORS_ORIGINS:https://travyn-frontend.vercel.app}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

app.base-url=${APP_BASE_URL:https://travyn-frontend.vercel.app}

# ── Actuator ──
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── SpringDoc / Swagger ──
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging (reduced for production) ──
logging.level.com.travyn=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN

# ── File Uploads ──
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Security & Secrets ──
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
location.encryption.key=${LOCATION_ENCRYPTION_KEY}
vapid.public.key=${VAPID_PUBLIC_KEY}
vapid.private.key=${VAPID_PRIVATE_KEY}
telegram.bot.token=${TELEGRAM_BOT_TOKEN}
telegram.webhook.secret=${TELEGRAM_WEBHOOK_SECRET:}
