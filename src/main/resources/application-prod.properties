# ═══════════════════════════════════════════════════════════════
#  Travyn Backend — Production Profile
#  Activate: SPRING_PROFILES_ACTIVE=prod (set in Render env vars)
#  ALL secrets are read from environment variables.
# ═══════════════════════════════════════════════════════════════

server.port=8080
spring.application.name=travyn-backend

# ── Datasource (Neon PostgreSQL) ──
spring.datasource.url=${NEON_DB_URL}
spring.datasource.username=${NEON_DB_USERNAME}
spring.datasource.password=${NEON_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=90000
spring.datasource.hikari.initialization-fail-timeout=90000
spring.datasource.hikari.max-lifetime=240000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.idle-timeout=180000

# ── JPA / Hibernate ──
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
spring.jpa.hibernate.ddl-auto=validate

# ── Liquibase ──
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.enabled=true

# ── Redis and Mail Health Check — DISABLED ──
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration,org.springframework.boot.actuate.autoconfigure.mail.MailHealthContributorAutoConfiguration

# ── Mail ──
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:codekundan01@gmail.com}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── JWT ──
app.jwt.secret=${JWT_SECRET}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# ── CORS ──
app.cors.allowed-origins=${CORS_ORIGINS:https://travyn-frontend.vercel.app}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

app.base-url=${APP_BASE_URL:https://travyn-frontend.vercel.app}

# ── Actuator ──
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ── SpringDoc / Swagger ──
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Logging (reduced for production) ──
logging.level.com.travyn=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
